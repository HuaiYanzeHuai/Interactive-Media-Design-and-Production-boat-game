<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>正多边形海战 - PVP</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      color: #e8f0ff;
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
      background: none;
    }

    #top-bar {
      position: absolute;
      top: 10px;
      left: 0;
      right: 0;
      height: 100px;
      display: flex;
      justify-content: space-between;
      padding: 0 3vw;
      z-index: 20;
      background: none;
    }

    .player-ships {
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: none;
    }

    .ship-btn {
      width: 6.5vw;
      min-width: 75px;
      max-width: 130px;
      padding: 28px 0 20px;
      font-size: 1rem;
      font-weight: bold;
      color: white;
      text-align: center;
      border: 1px solid #555;
      border-radius: 6px;
      cursor: pointer;
      user-select: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      transition: all 0.22s ease;
      position: relative;
    }

    .ship-btn img {
      width: 42px;
      height: 42px;
      object-fit: contain;
    }

    .ship-btn .level {
      font-size: 1.05rem;
    }

    .ship-btn .hp {
      font-size: 0.9rem;
      opacity: 0.9;
    }

    /* 非回合状态 */
    .left-inactive  { background: #8b6914; }
    .right-inactive { background: #1b5e20; }

    /* 当前回合高亮 */
    .left-active    { background: #ffc107; color: #000; box-shadow: 0 0 20px #ffeb3b; }
    .right-active   { background: #4caf50; color: #000; box-shadow: 0 0 20px #8bc34a; }

    /* 已选中 */
    .selected {
      transform: scale(1.12);
      z-index: 10;
      box-shadow: 0 0 30px rgba(255,255,255,0.5) !important;
    }

    /* 已死亡 */
    .dead {
      background: #444 !important;
      color: #999;
      cursor: not-allowed;
      opacity: 0.65;
      pointer-events: none;
    }

    .dead .hp {
      color: #777;
    }

    .ship-btn:hover:not(.dead):not(.selected) {
      transform: scale(1.06);
      box-shadow: 0 0 25px rgba(255,255,255,0.3);
    }

    #canvas-wrapper {
      position: absolute;
      inset: 120px 0 100px;
      display: flex;
      justify-content: center;
      align-items: center;
      background: none;
    }

    #game-canvas {
      width:  min(92vmin, 92vh);
      height: min(92vmin, 92vh);
      border: 1px solid #445;
      border-radius: 12px;
      background: none;
    }

    #action-bar {
      position: absolute;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 40px;
      z-index: 20;
      background: none;
    }

    .action-btn {
      padding: 12px 36px;
      font-size: 1.15rem;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
    }

    #btn-move   { background: #0288d1; }
    #btn-attack { background: #d32f2f; }
    #btn-skip   { background: #7b1fa2; }

    .action-btn:hover:not(:disabled) {
      filter: brightness(1.18);
      transform: translateY(-3px);
    }

    .action-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <div id="top-bar">
    <div class="player-ships" id="left-player"></div>
    <div class="player-ships" id="right-player"></div>
  </div>

  <div id="canvas-wrapper">
    <canvas id="game-canvas"></canvas>
  </div>

  <div id="action-bar">
    <button class="action-btn" id="btn-move">移动</button>
    <button class="action-btn" id="btn-attack">攻击</button>
    <button class="action-btn" id="btn-skip">跳过</button>
  </div>

  <audio id="bgm" loop>
    <source src="./src/music/backgroundmusic.mp3" type="audio/mpeg">
    您的浏览器不支持音频元素
  </audio>

  <!-- <script src="./position.js"></script> -->
  <script src="./functional/function.js"></script>
  <script>
    // ───────────────────────────────────────────────
    // 船只数据（后续建议移到 function.js 或单独数据文件）
    // ───────────────────────────────────────────────
    const boats = [
      { id: 1, side: 'left',  level: 3, maxHP: 3, hp: 3, alive: true },
      { id: 2, side: 'left',  level: 2, maxHP: 2, hp: 2, alive: true },
      { id: 3, side: 'left',  level: 1, maxHP: 1, hp: 1, alive: true },
      { id: 4, side: 'left',  level: 1, maxHP: 1, hp: 1, alive: true },
      { id: 5, side: 'right', level: 3, maxHP: 3, hp: 3, alive: true },
      { id: 6, side: 'right', level: 2, maxHP: 2, hp: 2, alive: true },
      { id: 7, side: 'right', level: 1, maxHP: 1, hp: 1, alive: true },
      { id: 8, side: 'right', level: 1, maxHP: 1, hp: 1, alive: true }
    ];

    let currentPlayer = Math.random() > 0.5 ? 'right' : 'left';
    let selectedBoatId = null;

    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
      const size = Math.min(window.innerWidth * 0.92, window.innerHeight * 0.80);
      canvas.width = canvas.height = size;
      drawMap();
      // 如果引入了 position.js，可以在这里获取所有行动点
      // if (typeof getAllActionPoints === 'function') {
      //   window.allActionPoints = getAllActionPoints(canvas.width, canvas.height);
      // }
    }
    window.addEventListener('resize', resizeCanvas);

    function createShipButtons() {
      const leftContainer = document.getElementById('left-player');
      const rightContainer = document.getElementById('right-player');

      boats.forEach(boat => {
        const btn = document.createElement('div');
        btn.className = 'ship-btn';
        btn.dataset.id = boat.id;
        btn.dataset.side = boat.side;

        btn.innerHTML = `
          <img src="./src/picture/boat${boat.level}.png" alt="Lv${boat.level}">
          <div class="level">lv ${boat.level}</div>
          <div class="hp">${boat.hp} / ${boat.maxHP}</div>
        `;

        if (!boat.alive) {
          btn.classList.add('dead');
        }

        btn.addEventListener('click', () => {
          if (!boat.alive) return;
          if (currentPlayer !== boat.side) return;

          // 取消同阵营其他选中
          document.querySelectorAll(`.ship-btn[data-side="${boat.side}"]`).forEach(el => {
            el.classList.remove('selected');
          });

          btn.classList.add('selected');
          selectedBoatId = boat.id;

          console.log(`选中船只：ID ${boat.id}，等级 ${boat.level}`);
        });

        if (boat.side === 'left') {
          leftContainer.appendChild(btn);
        } else {
          rightContainer.appendChild(btn);
        }
      });
    }

    function updateTurnHighlight() {
      document.querySelectorAll('.ship-btn').forEach(btn => {
        const side = btn.dataset.side;
        btn.classList.remove('left-active', 'right-active', 'left-inactive', 'right-inactive');

        if (side === 'left') {
          btn.classList.add(currentPlayer === 'left' ? 'left-active' : 'left-inactive');
        } else {
          btn.classList.add(currentPlayer === 'right' ? 'right-active' : 'right-inactive');
        }
      });
    }

    // 更新单艘船状态（战斗后调用）
    function updateBoatStatus(boatId, newHP, isAlive) {
      const boat = boats.find(b => b.id == boatId);
      if (!boat) return;

      boat.hp = newHP;
      boat.alive = isAlive;

      const btn = document.querySelector(`.ship-btn[data-id="${boatId}"]`);
      if (!btn) return;

      btn.querySelector('.hp').textContent = `${newHP} / ${boat.maxHP}`;

      if (!isAlive) {
        btn.classList.add('dead');
        if (selectedBoatId == boatId) {
          btn.classList.remove('selected');
          selectedBoatId = null;
        }
      }
    }

    function drawMap() {
      if (!ctx) return;
      const w = canvas.width, h = canvas.height;
      const cx = w / 2, cy = h / 2;
      const maxR = Math.min(w, h) / 2 * 0.92;

      ctx.clearRect(0, 0, w, h);

      // 同心圆
      ctx.strokeStyle = '#5a9be8';
      ctx.lineWidth = 3.5;
      [0.33, 0.60, 0.87].forEach(ratio => {
        ctx.beginPath();
        ctx.arc(cx, cy, maxR * ratio, 0, Math.PI * 2);
        ctx.stroke();
      });

      // 中心点
      ctx.fillStyle = '#fff176';
      ctx.beginPath();
      ctx.arc(cx, cy, 16, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#ffb300';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // 行动按钮逻辑
    document.getElementById('btn-move').onclick = () => {
      if (!selectedBoatId) {
        alert("请先选择一艘船只");
        return;
      }
      alert(`尝试移动船只 ID: ${selectedBoatId}（功能待实现）`);
    };

    document.getElementById('btn-attack').onclick = () => {
      if (!selectedBoatId) {
        alert("请先选择一艘船只");
        return;
      }
      alert(`尝试使用船只 ID: ${selectedBoatId} 攻击（功能待实现）`);
    };

    document.getElementById('btn-skip').onclick = () => {
      if (confirm("确定跳过回合？（可能触发增益点刷新）")) {
        currentPlayer = currentPlayer === 'left' ? 'right' : 'left';
        updateTurnHighlight();
        // 可在此添加回合结束的其他逻辑（如静止惩罚检查）
      }
    };

    // 初始化
    window.addEventListener('load', () => {
      resizeCanvas();
      createShipButtons();
      updateTurnHighlight();
      drawMap();

      const audio = document.getElementById('bgm');
      audio.play().catch(() => {
        document.body.addEventListener('click', () => audio.play(), {once: true});
      });
    });
  </script>
</body>
</html>
